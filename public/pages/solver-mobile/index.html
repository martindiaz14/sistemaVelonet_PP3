<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velonet - Resolución de Reclamo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-stone-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div
        class="bg-white p-6 md:p-8 rounded-xl shadow-2xl border border-gray-200 w-full max-w-md transform transition-all">

        <div class="border-b border-gray-200 pb-4 mb-6 text-center">
            <h2 class="text-2xl font-black text-sky-700">Velonet</h2>
            <h3 class="text-lg font-bold text-gray-800 mt-1">Resolución de Reclamo</h3>
            <p class="text-sm text-gray-500">Completá los datos para cerrar el ticket</p>
        </div>

        <form id="resolve-form" class="space-y-5">

            <div>
                <label for="detailstec" class="block text-sm font-semibold text-gray-700 mb-1">
                    Detalles Técnicos
                </label>
                <textarea id="detailstec" required
                    class="w-full h-32 p-3 text-sm text-gray-800 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 resize-none transition-shadow"
                    placeholder="Describe cómo se solucionó el problema..."></textarea>
            </div>

            <div>
                <label for="severety" class="block text-sm font-semibold text-gray-700 mb-1">
                    Nivel de Gravedad
                </label>
                <select id="severety"
                    class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                    <option value="Baja">Baja</option>
                    <option value="Media" selected>Media</option>
                    <option value="Alta">Alta</option>
                </select>
            </div>

            <div class="pt-4 border-t border-gray-100">
                <button type="submit" id="submit-btn"
                    class="w-full flex justify-center items-center gap-2 bg-sky-600 hover:bg-sky-700 text-white py-3 px-5 text-lg font-bold rounded-lg shadow-md hover:shadow-lg active:scale-95 transition-all duration-200">
                    Confirmar Cierre ☑︎
                </button>
            </div>
        </form>

        <div id="message-box" class="hidden mt-6 text-center text-sm font-bold p-4 rounded-lg"></div>
    </div>
    <script type="module" src="/pages/solver-mobile/index.js"></script>
</body>

</html>
