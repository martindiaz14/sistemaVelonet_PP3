<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-sky-900 text-gray-100">

    <header id="header" class="sticky top-0 z-50"></header>

    <div class="flex flex-space-x-2 items-center m-10">

        <button id="open-div-form"
            class="fixed bottom-6 right-6 bg-sky-600 border-4 border-black hover:bg-sky-700 text-white w-20 h-20 rounded-full shadow-2xl flex items-center justify-center transition-all hover:scale-110 active:scale-95 z-50 group">
            <i class="fas fa-plus text-2xl group-hover:rotate-90 transition-transform duration-300"></i>
            <span
                class="absolute right-16 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
                Nuevo Registro
            </span>
        </button>

        <div id="div-form"
            class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center hidden z-[60] p-4">
            <div
                class="bg-white w-full max-w-lg rounded-xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">

                <div class="bg-sky-700 p-4 flex justify-between items-center text-white">
                    <h2 class="text-xl font-bold"><i class="fas fa-file-alt mr-2"></i>Nuevo Reclamo</h2>
                    <button id="close-div-form" class="hover:bg-sky-800 rounded-full w-8 h-8 transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <form id="claim-form" class="p-6 space-y-4 text-gray-800">

                    <div class="relative">
                        <label class="block text-sm font-semibold mb-1">Cliente</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
                            <input list="clients-list" id="client-search" placeholder="Buscar cliente..."
                                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none">
                        </div>
                        <datalist id="clients-list">
                        </datalist>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">Servicio</label>
                            <select id="claim-service"
                                class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none">
                                <option value="..." selected>...</option>
                                <option value="Internet">Internet</option>
                                <option value="Camaras">Camaras</option>
                                <option value="Alarmas">Alarmas</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1">Recurrencia</label>
                            <select id="claim-recurrence"
                                class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none">
                                <option value="..." selected>...</option>
                                <option value="Baja">Baja</option>
                                <option value="Media">Media</option>
                                <option value="Alta">Alta</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Descripción del Reclamo</label>
                        <textarea id="claim-description" rows="4" placeholder="Detalles del problema..."
                            class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none resize-none"></textarea>
                    </div>

                    <div class="flex space-x-3 pt-4">
                        <button type="button" id="cancel-claim"
                            class="flex-1 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-lg transition-colors">
                            Cancelar
                        </button>
                        <button type="submit"
                            class="flex-1 py-2 bg-sky-600 hover:bg-sky-700 text-white font-bold rounded-lg shadow-md transition-colors">
                            Guardar Reclamo
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="relative text-black max-w-xs ">
            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>

            <input type="text" id="searchInput" placeholder="Buscar cliente o N°"
                class="w-full py-2 pl-10 pr-4 border border-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>


        <button id="filter-button"
            class="bg-sky-600 text-white mr-14 rounded-lg mr-1 ml-3  px-6 py-2 shadow-lg focus:ring-indigo-500 focus:border-indigo-500">
            ▼
        </button>

        <div id="popup-div"
            class="absolute hidden bg-white p-4 top-36 left-[320px] text-black  rounded-lg space-y-2 shadow-2xl border border-gray-100 z-10 w-96">

            <div class="border-b border-gray-200 pb-2">
                <h3 class="text-lg font-bold text-gray-800">Configuración de Filtros</h3>
            </div>
            <div>
                <label for="time-select" class="block text-sm font-semibold text-gray-700 mb-1">Tiempo</label>
                <select id="time-select"
                    class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                    <option value="..." selected>...</option>
                    <option value="P">Fecha Personalizada</option>
                    <option value="Dia">Día</option>
                    <option value="Semana">Semana</option>
                    <option value="Mes">Mes</option>
                    <option value="Año">Año</option>
                </select>
            </div>

            <div id="popup-div-date" class="hidden">
                <p class="font-medium hidden text-sm mt-3">Fecha Personalizada:</p>
                <div class="flex space-x-4 items-center">

                    <div>
                        <label for="date-from" class="block text-sm font-semibold text-gray-700 mb-1">Desde:</label>
                        <input id="date-from" type="date"
                            class="w-full bg-sky-600 rounded-lg px-2 py-1 shadow-lg text-white focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label for="date-to" class="block text-sm font-semibold text-gray-700 mb-1">Hasta:</label>
                        <input id="date-to" type="date"
                            class="w-full bg-sky-600 rounded-lg px-2 py-1 shadow-lg text-white focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
            </div>
            <div>
                <label for="type-select" class="block text-sm font-semibold text-gray-700 mb-1">Tipo</label>
                <select id="type-select"
                    class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                    <option selected>...</option>
                    <option value="Tecnico">Técnico</option>
                    <option value="Comercial">Comercial</option>
                    <option value="Industrial">Industrial</option>
                </select>
            </div>

            <!-- <div>
                <label for="severity-select" class="font-medium block mb-1 mt-3">Gravedad</label>
                <select id="severity-select" class="w-full p-2 border border-gray-300 rounded">
                    <option selected>...</option>
                    <option value="Baja">Baja</option>
                    <option value="Medio">Media</option>
                    <option value="Alta">Alta</option>
                </select>
            </div> -->

            <div>
                <label for="recurrence-select"
                    class="block text-sm font-semibold text-gray-700 mb-1">Recurrencia</label>
                <select id="recurrence-select"
                    class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                    <option selected>...</option>
                    <option value="Baja">Baja</option>
                    <option value="Media">Media</option>
                    <option value="Alta">Alta</option>
                </select>
            </div>

            <div>
                <label for="service-select" class="block text-sm font-semibold text-gray-700 mb-1">Servicio</label>
                <select id="service-select"
                    class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                    <option selected>...</option>
                    <option value="Internet">Internet</option>
                    <option value="Camaras">Camaras</option>
                    <option value="Alarmas">Alarmas</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>


            <div class="flex justify-end pt-4">
                <button id="apply-btn"
                    class="bg-sky-700 font-bold hover:bg-sky-800 text-white py-2 px-4 rounded shadow-md">
                    Aplicar Filtros
                </button>
            </div>
        </div>
    </div>

    <ul class="w-full p-2 bg-sky-600 border-t-4 border-sky-900 " id="container">

    </ul>


</body>
<script type="module" src="/pages/index.js"></script>


</html>
