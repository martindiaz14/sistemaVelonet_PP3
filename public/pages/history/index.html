<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial De Reclamos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-sky-900 text-gray-100">

    <header id="header" class="sticky top-0 z-50"></header>

    <div class="flex justify-between items-center m-10 w-full">

        <div class="flex items-center space-x-4">

            <div class="relative text-black max-w-xs">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>

                <input type="text" id="searchInput" placeholder="Buscar cliente o N°"
                    class="w-full py-2 pl-10 pr-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button id="filter-button"
                class="bg-sky-600 text-white mr-14 rounded-lg mr-1 ml-3  px-6 py-2 shadow-lg focus:ring-indigo-500 focus:border-indigo-500">
                ▼
            </button>

            <div id="popup-filter-div"
                class="absolute hidden bg-white p-4 top-36 left-[310px] text-black  rounded-lg shadow-2xl border border-gray-100 space-y-2 z-10 w-96">

                <div class="border-b border-gray-200 pb-2">
                    <h3 class="text-lg font-bold text-gray-800">Configuración de Filtros</h3>
                </div>

                <div>
                    <label for="time-filter-select"
                        class="block text-sm font-semibold text-gray-700 mb-1">Tiempo</label>
                    <select id="time-filter-select"
                        class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                        <option value="..." selected>...</option>
                        <option value="P">Fecha Personalizada</option>
                        <option value="Dia">Día</option>
                        <option value="Semana">Semana</option>
                        <option value="Mes">Mes</option>
                        <option value="Año">Año</option>
                    </select>
                </div>
                <div id="filter-div-date" class="hidden">
                    <p class="font-medium text-sm mt-3">Fecha Personalizada:</p>
                    <div class="flex space-x-4 items-center">

                        <div>
                            <label for="date-filter-from"
                                class="block text-sm font-semibold text-gray-700 mb-1">Desde:</label>
                            <input id="date-filter-from" type="date"
                                class="w-full bg-sky-600 rounded-lg px-2 py-1 shadow-lg text-white focus:ring-indigo-500 focus:border-indigo-500">
                        </div>

                        <div>
                            <label for="date-filter-to"
                                class="block text-sm font-semibold text-gray-700 mb-1">Hasta:</label>
                            <input id="date-filter-to" type="date"
                                class="w-full bg-sky-600 rounded-lg px-2 py-1 shadow-lg text-white focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                    </div>
                </div>
                <div>
                    <label for="type-select" class="block text-sm font-semibold text-gray-700 mb-1">Tipo</label>
                    <select id="type-select"
                        class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                        <option selected>...</option>
                        <option value="Tecnico">Técnico</option>
                        <option value="Comercial">Comercial</option>
                        <option value="Industrial">Industrial</option>
                    </select>
                </div>

                <div>
                    <label for="severity-select" class="block text-sm font-semibold text-gray-700 mb-1">Gravedad</label>
                    <select id="severity-select"
                        class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                        <option selected>...</option>
                        <option value="Baja">Baja</option>
                        <option value="Medio">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>

                <div>
                    <label for="recurrence-select"
                        class="block text-sm font-semibold text-gray-700 mb-1">Recurrencia</label>
                    <select id="recurrence-select"
                        class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                        <option selected>...</option>
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>


                <div>
                    <label for="service-select" class="block text-sm font-semibold text-gray-700 mb-1">Servicio</label>
                    <select id="service-select"
                        class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                        <option selected>...</option>
                        <option value="Internet">Internet</option>
                        <option value="Camaras">Camaras</option>
                        <option value="Alarmas">Alarmas</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>


                <div class="flex justify-end pt-4">
                    <button id="apply-btn"
                        class="bg-sky-700 font-bold hover:bg-sky-800 text-white py-2 px-4 rounded shadow-md">
                        Aplicar Filtros
                    </button>
                </div>
            </div>

        </div>

        <button id="report-button"
            class="bg-sky-600 text-l font-bold text-white mr-14 rounded-lg mr-1 px-6 py-2 shadow-lg focus:ring-indigo-500 focus:border-indigo-500">
            Reporte
        </button>

    </div>

    <div id="popup-div"
        class="absolute hidden bg-stone-50 p-4 top-32 right-32 text-black rounded-lg shadow-2xl border border-gray-100 space-y-3 z-10 w-96">

         <div class="border-b border-gray-200 pb-2">
                    <h3 class="text-lg font-bold text-gray-800">Configuración de Reportes Predifinidos</h3>
                </div>

        <div>
            <label for="report-key-select" class="block text-sm font-semibold text-gray-700 mb-1">Seleccionar Reporte</label>
            <select id="report-key-select" class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                <option selected value="">--- Seleccionar ---</option>
                <option value="TENDENCIA_Y_DEMANDA">Tendencia y Demanda (Creados vs. Resueltos)</option>
                <option value="RIESGO_Y_CALIDAD">Riesgo y Calidad (Gravedad y Recurrencia)</option>
                <option value="SATIFACCION_DEL_CLIENTE">Satisfacción del Cliente (Rating)</option>
                <option value="TOP_CLIENTES">Clientes con mas Reclamos</option>
                <option value="TIEMPO_RESOLUCION">Tiempo de Resolucion</option>
                <option value="DISTRIBUCION_POR_TIPO">Distribución por Tipo de Reclamo</option>
                <option value="ESTADO_ACTUAL">Estado Actual del Backlog</option>
            </select>
        </div>

        <hr class="border-gray-300">

        <div>
            <label for="time-select" class="block text-sm font-semibold text-gray-700 mb-1">Período de Tiempo</label>
            <select id="time-select" class="w-full p-2.5 text-sm text-gray-800 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 cursor-pointer transition-shadow">
                <option selected value="Todo">Todo el Tiempo</option>
                <option value="Personalizado">Rango Personalizado</option>
                <option value="Dia">Hoy</option>
                <option value="Semana">Última Semana</option>
                <option value="Mes">Último Mes</option>
                <option value="Año">Último Año</option>
            </select>
        </div>

        <div id="popup-div-date" class="hidden">
            <p class="block text-m font-semibold text-gray-700 mb-1">Rango de Fecha Personalizada:</p>
            <div class="flex space-x-4 items-center">
                <div>
                    <label for="date-from" class="block text-sm font-semibold text-gray-700 mb-1">Desde:</label>
                    <input id="date-from" type="date"
                        class="w-full bg-sky-600 rounded-lg px-2 py-1 shadow-lg text-white focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label for="date-to" class="block text-sm font-semibold text-gray-700 mb-1">Hasta:</label>
                    <input id="date-to" type="date"
                        class="w-full bg-sky-600 rounded-lg px-2 py-1 shadow-lg text-white focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
        </div>
        <div class="flex justify-end pt-4">
            <button id="preview-report-btn"
                class="bg-sky-700 font-bold hover:bg-sky-800 text-white py-2 px-4 rounded shadow-md">
                Vista Previa
            </button>
        </div>
    </div>
    </div>

    </div>


    <ul class="w-full p-2 bg-sky-600 " id="container">

    </ul>


</body>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module" src="/pages/history/index.js"></script>

</html>
